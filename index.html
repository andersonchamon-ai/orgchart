<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LionX — Organograma (DEV)</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--card-vacant:#2d1b1b;--border:#334155;--border-vacant:#ef4444;--text:#e2e8f0;--text-muted:#94a3b8;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--line:#475569}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;overflow:auto}
.dev-banner{background:#f59e0b;color:#000;text-align:center;padding:6px;font-size:13px;font-weight:700;position:fixed;top:0;left:0;right:0;z-index:200}
.toolbar{position:fixed;top:0;left:0;right:0;background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);padding:12px 24px;display:flex;align-items:center;gap:12px;z-index:100;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.toolbar h1{font-size:18px;font-weight:700;color:var(--accent)}
.toolbar .stats{margin-left:auto;font-size:13px;color:var(--text-muted)}
.toolbar button{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.toolbar button:hover{opacity:0.85}
.toolbar button.secondary{background:var(--border)}
.container{padding:96px 24px 40px;min-height:100vh}
.tag{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600}
.tag-pws{background:#0e4429;color:#22c55e}
.tag-phiz{background:#1e1b4b;color:#818cf8}
.tag-fab{background:#422006;color:#f59e0b}
.tag-holding{background:#172554;color:#60a5fa}
.company-section{margin-bottom:48px}
.company-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;padding:12px 16px;background:var(--card);border-radius:10px;border-left:4px solid var(--accent)}
.company-header h2{font-size:16px;font-weight:700}

/* Tree container */
.tree-wrap{position:relative;overflow-x:auto;padding:20px 0;-webkit-overflow-scrolling:touch}
.tree-wrap > .tree-level{display:inline-flex;min-width:100%;justify-content:center;flex-wrap:nowrap}
.tree-inner{display:inline-block;min-width:100%;position:relative}
.tree-wrap svg{position:absolute;top:0;left:0;pointer-events:none}
.tree-level{display:flex;justify-content:center;gap:24px;margin-top:40px;position:relative;flex-wrap:nowrap}
.tree-level-group{display:flex;flex-direction:column;align-items:center;flex-shrink:0}

/* Card */
.node-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;width:170px;flex-shrink:0;cursor:pointer;transition:all 0.2s;text-align:center;position:relative;z-index:1}
.node-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.3)}
.node-card.vacant{background:var(--card-vacant);border:1px dashed var(--border-vacant)}
.node-card.vacant .node-name{color:var(--red);font-style:italic}
.node-card.ceo{border-color:var(--accent);border-width:2px}
.node-name{font-size:14px;font-weight:600;margin-bottom:2px}
.node-role{font-size:12px;color:var(--text-muted)}
.node-card .remove-btn{position:absolute;top:4px;right:6px;background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;opacity:0;transition:opacity 0.2s}
.node-card:hover .remove-btn{opacity:0.5}
.toggle-btn{display:inline-block;background:var(--border);border:none;color:var(--text-muted);width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:11px;line-height:20px;text-align:center;margin-top:4px;transition:all 0.2s;position:relative;z-index:2}
.toggle-btn:hover{background:var(--accent);color:#fff}
.toggle-btn.active{background:var(--accent);color:#fff}

/* Holding */
.holding-section{text-align:center;margin-bottom:40px}
.holding-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:8px}
.holding-section .level-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin:20px 0 12px}

/* Unassigned */
.unassigned-section{margin-top:20px;padding:14px 16px;background:rgba(148,163,184,0.04);border:1px dashed var(--border);border-radius:10px}
.unassigned-section.collapsed-ua{padding:6px 16px}
.unassigned-section.collapsed-ua .unassigned-header{margin-bottom:0}
.unassigned-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.unassigned-header h3{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.unassigned-header button{background:transparent;border:1px dashed var(--border);color:var(--text-muted);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.unassigned-header button:hover{border-color:var(--text-muted);color:var(--text)}
.unassigned-list{display:flex;flex-wrap:wrap;gap:8px}
.unassigned-item{background:transparent;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.unassigned-item:hover{border-color:var(--text-muted);color:var(--text)}
.unassigned-item .remove-ua{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;opacity:0;transition:opacity 0.2s}
.unassigned-item:hover .remove-ua{opacity:0.7}
.legend{display:flex;gap:16px;align-items:center;font-size:12px;color:var(--text-muted);margin-left:16px}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:10px;height:10px;border-radius:3px}
.dot-filled{background:var(--accent)}
.dot-vacant{background:var(--red);border:1px dashed var(--red)}

/* Modal */
/* Responsive */
@media(max-width:768px){
  .node-card{width:130px;padding:10px 12px}
  .node-name{font-size:12px}
  .node-role{font-size:10px}
  .tree-level{gap:12px;margin-top:0}
  .holding-row{gap:8px}
  .company-header h2{font-size:14px}
  .tag{font-size:10px}
  .toolbar h1{font-size:14px}
  .toolbar{padding:8px 12px;gap:6px;flex-wrap:nowrap}
  .toolbar button{padding:6px 10px;font-size:11px}
  .container{padding:100px 12px 30px}
  .toggle-btn{width:18px;height:18px;font-size:10px;line-height:18px}
}
@media(max-width:480px){
  .node-card{width:110px;padding:8px 10px}
  .node-name{font-size:11px}
  .node-role{font-size:9px}
  .tree-level{gap:8px;margin-top:24px}
  .holding-row{gap:6px}
  .toolbar .legend{display:none}
  .toolbar .stats{font-size:11px}
}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:450px;max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:16px;font-size:16px}
.modal label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px;margin-top:12px}
.modal input,.modal select{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-family:inherit}
.modal .btn-row{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal button{padding:8px 20px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:13px}
.modal .btn-save{background:var(--accent);color:#fff}
.modal .btn-cancel{background:var(--border);color:var(--text)}
.modal .resp-list{margin-top:8px}
.modal .resp-entry{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.modal .resp-entry input{flex:1}
.modal .resp-entry button{background:var(--red);color:#fff;padding:6px 10px;border-radius:4px;border:none;cursor:pointer;font-size:12px}
.modal .add-resp-btn{background:transparent;border:1px dashed var(--border);color:var(--text-muted);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;margin-top:4px}
.modal .add-resp-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head><body>


<div class="toolbar">
  <h1>🦁 LionX — Organograma</h1>
  <div class="legend">
    <span><span class="dot dot-filled"></span> Preenchido</span>

  <button class="secondary" onclick="exportJSON()">💾 Exportar</button>
  <button class="secondary" onclick="importJSON()">📂 Importar</button>

<!-- Person Modal -->
<div class="modal-overlay" id="modalOverlay">

    <h3 id="modalTitle">Editar Posição</h3>
    <label>Nome</label><input id="mName" placeholder="Nome da pessoa (vazio = vaga aberta)">

</div>
<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
const COMPANIES = [
  {id:'lionx', name:'LionX (Holding)', tag:'tag-holding', color:'#3b82f6'},
  {id:'pws', name:'PWS Cloud', tag:'tag-pws', color:'#22c55e'},
  {id:'phiz', name:'PhizChat', tag:'tag-phiz', color:'#818cf8'},
  {id:'fabrica', name:'Fábrica de Software', tag:'tag-fab', color:'#f59e0b'},
];

let data = [
  {id:1, name:'Anderson Chamon', role:'CEO', company:'lionx', level:0, reportsTo:null, responsibilities:[]},
  {id:10, name:'Márcio Galbe', role:'CEO', company:'pws', level:1, reportsTo:1, responsibilities:[]},
  {id:11, name:'Henrique Weber', role:'CTO', company:'pws', level:2, reportsTo:10, responsibilities:[]},
  {id:12, name:'Dyane Caroliny', role:'Head Human Resources', company:'pws', level:2, reportsTo:10, responsibilities:[]},
  {id:13, name:'Rodrigo Lima', role:'Coordenador Financeiro', company:'pws', level:2, reportsTo:10, responsibilities:[]},
  {id:14, name:'Allan Yukio Oka', role:'Head Growth', company:'pws', level:2, reportsTo:10, responsibilities:[]},
  {id:20, name:'Raphael', role:'CEO', company:'phiz', level:1, reportsTo:1, responsibilities:[]},
  {id:21, name:'Louis', role:'CTO', company:'phiz', level:2, reportsTo:20, responsibilities:[]},
  {id:22, name:'Luiz Felipe (Luizinho)', role:'CPO', company:'phiz', level:2, reportsTo:20, responsibilities:[]},
  {id:23, name:'Alex', role:'RH', company:'phiz', level:2, reportsTo:20, responsibilities:[]},
  {id:24, name:'Michel', role:'Financeiro', company:'phiz', level:2, reportsTo:20, responsibilities:[]},
  {id:25, name:'', role:'QA Lead / War Room', company:'phiz', level:3, reportsTo:21, responsibilities:[]},
  {id:26, name:'', role:'Tech Lead - Call', company:'phiz', level:3, reportsTo:21, responsibilities:[]},
  {id:27, name:'', role:'Tech Lead - Chat', company:'phiz', level:3, reportsTo:21, responsibilities:[]},
  {id:28, name:'', role:'Designer Lead (UI/UX)', company:'phiz', level:3, reportsTo:22, responsibilities:[]},
  {id:30, name:'Jenner', role:'CEO', company:'fabrica', level:1, reportsTo:1, responsibilities:[]},
  {id:31, name:'Gênero', role:'Gestor Operacional', company:'fabrica', level:2, reportsTo:30, responsibilities:[]},
  {id:32, name:'Wesley', role:'Líder Técnico', company:'fabrica', level:2, reportsTo:30, responsibilities:[]},
  {id:33, name:'', role:'Head de Vendas / Novos Projetos', company:'fabrica', level:2, reportsTo:30, responsibilities:[]},
  {id:34, name:'', role:'Coordenador de Squads', company:'fabrica', level:3, reportsTo:31, responsibilities:[]},
  {id:40, name:'Ju', role:'Financeiro', company:'lionx', level:2, reportsTo:1, responsibilities:[]},
  {id:41, name:'Bruna', role:'RH', company:'lionx', level:2, reportsTo:1, responsibilities:[]},
  {id:42, name:'André', role:'CFO (JTF)', company:'lionx', level:2, reportsTo:1, responsibilities:[]},
  {id:43, name:'', role:'Chief of Staff', company:'lionx', level:2, reportsTo:1, responsibilities:[]},
];

let unassigned = {lionx:[],pws:[],phiz:[],fabrica:[]};
let collapsedSet = new Set();
let unassignedOpen = {lionx:false, pws:false, phiz:false, fabrica:false};
let nextId = 100;
let editingId = null;
let uaEditCompany = null;
let uaEditIndex = null;

function getChildren(parentId) {
  return data.filter(d => d.reportsTo === parentId);
}

function renderCardHTML(item) {
  const vacant = !item.name;
  const isCeo = item.level <= 1;
  const children = getChildren(item.id);
  const hasChildren = children.length > 0 && !collapsedSet.has(item.id);
  const isCollapsed = collapsedSet.has(item.id);
  const showToggle = getChildren(item.id).length > 0;
  return `<div class="node-card ${vacant?'vacant':''} ${isCeo?'ceo':''}" data-id="${item.id}" onclick="editCard(${item.id})">
    <div class="node-name">${vacant ? '⚠️ VAGA' : item.name}</div>
    <div class="node-role">${item.role}</div>
    <button class="remove-btn" onclick="event.stopPropagation();removeCard(${item.id})">✕</button>
  </div>${showToggle ? `<button class="toggle-btn ${isCollapsed?'active':''}" data-toggle="${item.id}" onclick="event.stopPropagation();toggleCollapse(${item.id})">${isCollapsed?'+':'−'}</button>` : ''}`;
}

// Recursive render: each node is a column (card on top, children row below)
function renderSubtree(item) {
  const children = getChildren(item.id);
  const isCollapsed = collapsedSet.has(item.id);
  let html = `<div class="tree-level-group" data-node="${item.id}">`;
  html += renderCardHTML(item);
  if (children.length > 0 && !isCollapsed) {
    html += `<div class="tree-level" data-parent="${item.id}">`;
    for (const child of children) {
      html += renderSubtree(child);
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function render() {
  const c = document.getElementById('container');
  let html = '';

  // Holding
  const ceo = data.find(d => d.id === 1);
  const holdingDirect = data.filter(d => d.company === 'lionx' && d.reportsTo === 1);
  html += `<div class="holding-section">`;
  html += `<div class="company-header" style="justify-content:center"><h2>LionX (Holding)</h2><span class="tag tag-holding">${data.filter(d=>d.company==='lionx'&&d.name).length} preenchidos</span></div>`;
  if (ceo) html += `<div style="display:flex;justify-content:center;margin:16px 0"><div class="node-card ceo" onclick="editCard(${ceo.id})"><div class="node-name">${ceo.name}</div><div class="node-role">${ceo.role}</div></div></div>`;
  if (holdingDirect.length > 0) {
    html += `<div class="level-label">Diretos ao CEO</div><div class="holding-row">`;
    for (const item of holdingDirect) {
      const vacant = !item.name;
      html += `<div class="node-card ${vacant?'vacant':''}" onclick="editCard(${item.id})"><div class="node-name">${vacant?'⚠️ VAGA':item.name}</div><div class="node-role">${item.role}</div><button class="remove-btn" onclick="event.stopPropagation();removeCard(${item.id})">✕</button></div>`;
    }
    html += `</div>`;
  }
  html += renderUnassigned('lionx');
  html += `</div>`;

  // Company trees
  for (const comp of COMPANIES) {
    if (comp.id === 'lionx') continue;
    const compPeople = data.filter(d => d.company === comp.id);
    if (compPeople.length === 0) continue;
    const compCeo = compPeople.find(d => d.level === 1);
    if (!compCeo) continue;

    html += `<div class="company-section">`;
    html += `<div class="company-header"><h2>${comp.name}</h2><span class="tag ${comp.tag}">${compPeople.filter(i=>i.name).length}/${compPeople.length} preenchidos</span></div>`;
    html += `<div class="tree-wrap" id="tree-${comp.id}">`;
    html += `<div class="tree-inner">`;
    html += `<div class="tree-level" data-parent="root-${comp.id}">`;
    html += renderSubtree(compCeo);
    html += `</div></div></div>`;
    html += renderUnassigned(comp.id);
    html += `</div>`;
  }

  c.innerHTML = html;

  // Stats
  const total = data.length;
  const filled = data.filter(d => d.name).length;
  const vacant = total - filled;
  const totalUa = Object.values(unassigned).reduce((s, a) => s + a.length, 0);
  document.getElementById('stats').textContent = `${filled} preenchidos · ${vacant} vagas · ${totalUa} resp. a definir`;

  // Draw SVG lines after DOM is rendered
  requestAnimationFrame(() => {
    drawAllLines();
    document.querySelectorAll('.tree-wrap').forEach(el => {
      el.removeEventListener('scroll', drawAllLines);
      el.addEventListener('scroll', drawAllLines);
    });
  });
}

function drawAllLines() {
  for (const comp of COMPANIES) {
    if (comp.id === 'lionx') continue;
    const wrap = document.getElementById(`tree-${comp.id}`);
    if (!wrap) continue;
    const inner = wrap.querySelector('.tree-inner');
    if (!inner) continue;
    // Remove old SVG
    const oldSvg = inner.querySelector('svg');
    if (oldSvg) oldSvg.remove();

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.style.position = 'absolute';
    svg.style.top = '0';
    svg.style.left = '0';
    svg.style.width = inner.scrollWidth + 'px';
    svg.style.height = inner.scrollHeight + 'px';
    svg.style.pointerEvents = 'none';
    svg.style.zIndex = '0';

    const wrapRect = inner.getBoundingClientRect();

    // For each parent that has visible children
    const parentLevels = wrap.querySelectorAll('.tree-level[data-parent]');
    parentLevels.forEach(levelDiv => {
      const parentId = levelDiv.dataset.parent;
      if (parentId.startsWith('root-')) return; // skip root container

      const parentCard = wrap.querySelector(`.node-card[data-id="${parentId}"]`);
      if (!parentCard) return;

      const parentRect = parentCard.getBoundingClientRect();
      const px = parentRect.left + parentRect.width / 2 - wrapRect.left;
      const py = parentRect.bottom - wrapRect.top;

      // Find toggle button
      const toggleBtn = wrap.querySelector(`[data-toggle="${parentId}"]`);
      const toggleBottom = toggleBtn ? (toggleBtn.getBoundingClientRect().bottom - wrapRect.top) : py;
      const startY = toggleBtn ? toggleBottom + 2 : py + 4;

      // Get direct child cards
      const childGroups = levelDiv.querySelectorAll(':scope > .tree-level-group');
      if (childGroups.length === 0) return;

      const childPositions = [];
      childGroups.forEach(g => {
        const card = g.querySelector('.node-card');
        if (!card) return;
        const r = card.getBoundingClientRect();
        childPositions.push({
          x: r.left + r.width / 2 - wrapRect.left,
          y: r.top - wrapRect.top
        });
      });

      if (childPositions.length === 0) return;

      const midY = startY + (childPositions[0].y - startY) * 0.5;

      // Vertical line from parent down to midY
      addLine(svg, px, startY, px, midY);

      // Horizontal bar
      const leftX = Math.min(px, ...childPositions.map(c => c.x));
      const rightX = Math.max(px, ...childPositions.map(c => c.x));
      addLine(svg, leftX, midY, rightX, midY);

      // Vertical lines from midY down to each child
      childPositions.forEach(cp => {
        addLine(svg, cp.x, midY, cp.x, cp.y);
      });
    });

    inner.prepend(svg);
  }
}

function addLine(svg, x1, y1, x2, y2) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1);
  line.setAttribute('y1', y1);
  line.setAttribute('x2', x2);
  line.setAttribute('y2', y2);
  line.setAttribute('stroke', '#475569');
  line.setAttribute('stroke-width', '2');
  line.setAttribute('stroke-linecap', 'round');
  svg.appendChild(line);
}

function renderUnassigned(compId) {
  const ua = unassigned[compId] || [];
  const isOpen = unassignedOpen[compId];
  const count = ua.length;
  const countBadge = count > 0 ? `<span style="background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:8px">${count}</span>` : '';
  let html = `<div class="unassigned-section ${isOpen?'':'collapsed-ua'}">`;
  html += `<div class="unassigned-header" onclick="toggleUnassigned('${compId}')" style="cursor:pointer">`;
  html += `<h3><span style="font-size:10px;margin-right:4px">${isOpen?'▼':'▶'}</span>Responsabilidades a definir${countBadge}</h3>`;
  if (isOpen) html += `<button onclick="event.stopPropagation();addUnassigned('${compId}')">+ Adicionar</button>`;
  html += `</div>`;
  if (isOpen) {
    if (count > 0) {
      html += `<div class="unassigned-list">`;
      ua.forEach((item, idx) => { html += `<div class="unassigned-item" onclick="editUnassigned('${compId}',${idx})">${item}<button class="remove-ua" onclick="event.stopPropagation();removeUnassigned('${compId}',${idx})">✕</button></div>`; });
      html += `</div>`;
    } else {
      html += `<div style="font-size:12px;color:var(--text-muted);font-style:italic;padding:4px 0">Nenhuma responsabilidade pendente</div>`;
    }
  }
  return html + `</div>`;
}

function toggleUnassigned(compId) {
  unassignedOpen[compId] = !unassignedOpen[compId];
  render();
}

function toggleCollapse(id) {
  if (collapsedSet.has(id)) collapsedSet.delete(id); else collapsedSet.add(id);
  render();
}

// --- Person Modal ---
function updateReportsTo(item) {
  const company = document.getElementById('mCompany').value;
  const rs = document.getElementById('mReportsTo');
  const currentVal = item ? item.reportsTo : null;
  const people = data.filter(d => d.name && (!item || d.id !== item.id) && (d.company === company || d.company === 'lionx'));
  rs.innerHTML = '<option value="">— Ninguém (topo) —</option>' + people.map(d => `<option value="${d.id}" ${currentVal===d.id?'selected':''}>${d.name} (${d.role})</option>`).join('');
}
function openModal(item) {
  editingId = item ? item.id : null;
  document.getElementById('modalTitle').textContent = item ? 'Editar Posição' : 'Nova Posição';
  document.getElementById('mName').value = item ? item.name : '';
  document.getElementById('mRole').value = item ? item.role : '';
  const cs = document.getElementById('mCompany');
  cs.innerHTML = COMPANIES.map(c => `<option value="${c.id}" ${item&&item.company===c.id?'selected':''}>${c.name}</option>`).join('');
  document.getElementById('mLevel').value = item ? item.level : 2;
  updateReportsTo(item);
  document.getElementById('mCompany').onchange = () => updateReportsTo(item);
  const rl = document.getElementById('mRespList'); rl.innerHTML = '';
  (item ? (item.responsibilities||[]) : []).forEach(r => addRespField(r));
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('mName').focus();
}
function addRespField(value) {
  const rl = document.getElementById('mRespList');
  const div = document.createElement('div'); div.className = 'resp-entry';
  div.innerHTML = `<input class="resp-input" value="${value||''}" placeholder="Ex: Gestão de infraestrutura"><button type="button" onclick="this.parentElement.remove()">✕</button>`;
  rl.appendChild(div);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); editingId = null; }
function saveModal() {
  const name = document.getElementById('mName').value.trim();
  const role = document.getElementById('mRole').value.trim();
  const company = document.getElementById('mCompany').value;
  const level = parseInt(document.getElementById('mLevel').value);
  const reportsTo = document.getElementById('mReportsTo').value ? parseInt(document.getElementById('mReportsTo').value) : null;
  const responsibilities = Array.from(document.querySelectorAll('#mRespList .resp-input')).map(i=>i.value.trim()).filter(v=>v);
  if (!role) { alert('Cargo é obrigatório'); return; }
  if (editingId !== null) { const item = data.find(d=>d.id===editingId); Object.assign(item, {name,role,company,level,reportsTo,responsibilities}); }
  else { data.push({id:nextId++,name,role,company,level,reportsTo,responsibilities}); }
  closeModal(); render(); saveLocal();
}
function editCard(id) { openModal(data.find(d=>d.id===id)); }
function addPosition() { openModal(null); }
function removeCard(id) { if(confirm('Remover esta posição?')){data=data.filter(d=>d.id!==id);data.forEach(d=>{if(d.reportsTo===id)d.reportsTo=null;});render();saveLocal();} }

// --- Unassigned ---
function addUnassigned(c){uaEditCompany=c;uaEditIndex=null;document.getElementById('uaModalTitle').textContent='Nova Responsabilidade';document.getElementById('uaDesc').value='';document.getElementById('uaAssignRow').style.display='none';document.getElementById('uaAssignTo').value='';document.getElementById('uaModalOverlay').classList.add('active');document.getElementById('uaDesc').focus();}
function editUnassigned(c,i){uaEditCompany=c;uaEditIndex=i;document.getElementById('uaModalTitle').textContent='Editar Responsabilidade';document.getElementById('uaDesc').value=unassigned[c][i];const ar=document.getElementById('uaAssignRow'),as=document.getElementById('uaAssignTo');const p=data.filter(d=>d.company===c&&d.name);as.innerHTML='<option value="">— Manter pendente —</option>'+p.map(d=>`<option value="${d.id}">${d.name} (${d.role})</option>`).join('');ar.style.display='block';document.getElementById('uaModalOverlay').classList.add('active');document.getElementById('uaDesc').focus();}
function closeUaModal(){document.getElementById('uaModalOverlay').classList.remove('active');uaEditCompany=null;uaEditIndex=null;}
function saveUaModal(){const desc=document.getElementById('uaDesc').value.trim();if(!desc){alert('Descrição é obrigatória');return;}const at=document.getElementById('uaAssignTo').value;if(at&&uaEditIndex!==null){const p=data.find(d=>d.id===parseInt(at));if(p){if(!p.responsibilities)p.responsibilities=[];p.responsibilities.push(desc);unassigned[uaEditCompany].splice(uaEditIndex,1);}}else if(uaEditIndex!==null){unassigned[uaEditCompany][uaEditIndex]=desc;}else{if(!unassigned[uaEditCompany])unassigned[uaEditCompany]=[];unassigned[uaEditCompany].push(desc);}closeUaModal();render();saveLocal();}
function removeUnassigned(c,i){if(confirm('Remover?')){unassigned[c].splice(i,1);render();saveLocal();}}

// --- Export/Import ---
function syncToServer(){
  const payload = JSON.stringify({people:data, unassigned});
  fetch(API_URL + '/api/save', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:payload, credentials:'include'
  }).then(r => r.json()).then(res => {
    if(res.ok) { updateSyncStatus('✅ Salvo no banco'); alert('Dados salvos no banco de dados com snapshot de segurança!'); }
    else { updateSyncStatus('⚠️ Erro'); alert('Erro: ' + (res.error||'desconhecido')); }
  }).catch(() => { updateSyncStatus('☁️ Servidor offline'); alert('Servidor offline. Verifique se o Mac mini está ligado.'); });
}

async function showBackups(){
  try {
    const resp = await fetch(API_URL + '/api/snapshots', {credentials:'include'});
    const snapshots = await resp.json();
    if(snapshots.length===0){alert('Nenhum snapshot disponível.');return;}
    const options = snapshots.slice(0,20).map((s,i)=>
      `${i+1}. [${s.reason}] ${s.created_at} (${Math.round(s.size/1024)}KB)`
    ).join('\n');
    const choice = prompt(`Snapshots no banco (${snapshots.length} total):\n\n${options}\n\nDigite o número para restaurar (ou cancele):`);
    if(!choice) return;
    const idx = parseInt(choice)-1;
    if(idx<0||idx>=Math.min(20,snapshots.length)){alert('Número inválido');return;}
    if(!confirm('Restaurar este snapshot? Um backup de segurança será criado automaticamente antes.')) return;
    const restoreResp = await fetch(API_URL + '/api/restore', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({snapshot_id: snapshots[idx].id}),
      credentials:'include'
    });
    const result = await restoreResp.json();
    if(result.ok){
      data = result.data.people || [];
      unassigned = result.data.unassigned || {lionx:[],pws:[],phiz:[],fabrica:[]};
      nextId = Math.max(...data.map(d=>d.id))+1;
      data.forEach(d=>{if(!d.responsibilities)d.responsibilities=[];});
      render();
      alert('Snapshot restaurado com sucesso!');
    } else { alert('Erro: ' + result.error); }
  } catch(e) {
    alert('Servidor offline. Não é possível acessar backups.');
  }
}

function exportJSON(){const b=new Blob([JSON.stringify({people:data,unassigned},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='lionx-organograma.json';a.click();}
function importJSON(){const fi=document.getElementById('fileInput');fi.onchange=e=>{const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(Array.isArray(p)){data=p;}else{data=p.people||p;unassigned=p.unassigned||{lionx:[],pws:[],phiz:[],fabrica:[]};}nextId=Math.max(...data.map(d=>d.id))+1;data.forEach(d=>{if(!d.responsibilities)d.responsibilities=[];});render();saveLocal();}catch(e){alert('JSON inválido');}};r.readAsText(e.target.files[0]);};fi.click();}
// Try public tunnel first, fallback to localhost
const API_URLS = [
  'https://org.andersonchamon.ai',
  'http://localhost:8790'
];
let API_URL = API_URLS[0];
let lastServerSync = 0;

function saveLocal(){
  try{
    const payload = JSON.stringify({people:data,unassigned});
    localStorage.setItem('orgchart', payload);
    // Auto-backup in localStorage
    const backups = JSON.parse(localStorage.getItem('orgchart-prod-backups')||'[]');
    const now = Date.now();
    const lastBackup = backups.length > 0 ? backups[backups.length-1].ts : 0;
    if (now - lastBackup > 5*60*1000) {
      backups.push({ts:now, data:payload});
      while(backups.length > 10) backups.shift();
      localStorage.setItem('orgchart-prod-backups', JSON.stringify(backups));
    }
    // Auto-sync to SQLite on every save
    fetch(API_URL + '/api/save', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:payload, credentials:'include'
    }).then(r => {
      if(r.ok) updateSyncStatus('✅ Salvo');
      else updateSyncStatus('⚠️ Erro');
    }).catch(() => updateSyncStatus('⚠️ Offline'));
  }catch(e){}
}

function updateSyncStatus(msg) {
  let el = document.getElementById('syncStatus');
  if(!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0.5'; }, 3000);
}
function loadLocal(){try{const s=localStorage.getItem('orgchart');if(s){const p=JSON.parse(s);if(Array.isArray(p)){data=p;}else{data=p.people||p;unassigned=p.unassigned||{lionx:[],pws:[],phiz:[],fabrica:[]};}nextId=Math.max(...data.map(d=>d.id))+1;data.forEach(d=>{if(!d.responsibilities)d.responsibilities=[];});}}catch(e){}}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeUaModal();}});
window.addEventListener('resize', () => drawAllLines());
async function init() {
  // Priority: 1) SQLite via API  2) localStorage  3) hardcoded
  let loaded = false;
  // Auto-detect working API
  for (const url of API_URLS) {
    try {
      const test = await fetch(url + '/api/health', {signal: AbortSignal.timeout(3000), credentials:'include'});
      if (test.ok) { API_URL = url; break; }
    } catch(e) {}
  }
  try {
    const resp = await fetch(API_URL + '/api/data?t=' + Date.now(), {credentials:'include'});
    if (resp.ok) {
      const parsed = await resp.json();
      data = parsed.people || [];
      unassigned = parsed.unassigned || {lionx:[],pws:[],phiz:[],fabrica:[]};
      nextId = Math.max(...data.map(d=>d.id)) + 1;
      data.forEach(d => { if (!d.responsibilities) d.responsibilities = []; });
      loaded = true;
      console.log('📀 Dados carregados do banco SQLite');
      updateSyncStatus('✅ Banco conectado');
    }
  } catch(e) {
    console.log('Servidor offline, tentando localStorage...');
  }
  if (!loaded) {
    loadLocal();
    updateSyncStatus('⚠️ Modo offline');
  }
  render();
}
init();
