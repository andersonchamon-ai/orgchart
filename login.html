<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LionX — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #1a0a0a; color: #fff; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-box { width: 100%; max-width: 380px; text-align: center; }
  .logo { font-size: 48px; margin-bottom: 8px; }
  h1 { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
  .form-group { margin-bottom: 16px; text-align: left; }
  label { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    border: 1px solid #333; background: #161616; color: #fff;
    font-size: 16px; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: #2eaadc; }
  input::placeholder { color: #555; }
  .btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s; margin-top: 8px;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #2eaadc; color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; }
  .msg { margin-top: 12px; font-size: 13px; min-height: 20px; }
  .msg.error { color: #e03e3e; }
  .msg.success { color: #4dab9a; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🦁</div>
  <h1>LionX</h1>
  <div class="subtitle">Sistema de Gestão</div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" autofocus>
  </div>
  <div class="form-group">
    <label>Senha</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
  <div class="msg" id="msg"></div>
</div>
<script>
async function doLogin() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn-login');
  if (!email || !password) { msg.className='msg error'; msg.textContent='Preencha email e senha'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const d = await r.json();
    if (r.ok) {
      msg.className='msg success'; msg.textContent='✅ Autenticado!';
      setTimeout(() => { window.location.href = '/'; }, 300);
    } else {
      msg.className='msg error'; msg.textContent = d.error || 'Erro';
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  } catch(e) {
    msg.className='msg error'; msg.textContent='Erro de conexão';
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}
document.getElementById('email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('password').focus(); });
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
fetch('/api/auth/check').then(r=>r.json()).then(d=>{ if(d.authenticated) window.location.href='/'; });
</script>
</body>
</html>
